name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# IMPORTANTE: Este workflow é OBRIGATÓRIO em PRs.
# Mesmo que dev rode "git commit --no-verify" localmente,
# o PR não merge sem este passar.
# Ver: docs/architecture/06-production-readiness.md
permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --legacy-peer-deps

      - name: � Camada 0a — Anti-divergência (conflitos não resolvidos em governança)
        # Detecta marcadores de conflito Git em known-bugs.json e baselines.
        # Causa raiz de falsos-positivos de "FRÁGIL" em PRs criados em paralelo.
        run: |
          set -e
          GOV_PATHS="relatorios/known-bugs.json"
          [ -d relatorios/modulos ] && GOV_PATHS="$GOV_PATHS relatorios/modulos"
          if grep -rln '^<<<<<<< \|^>>>>>>> ' $GOV_PATHS 2>/dev/null; then
            echo "::error::Marcadores de conflito Git em arquivos de governança. Rebase + resolva."
            exit 1
          fi
          echo "✅ Sem conflitos de governança."

      - name: �🔒 Camada 0 — Validar known-bugs.json
        run: npm run known-bugs:validate

      - name: 🧾 Camada 0b — Certificação programática obrigatória
        run: node scripts/certify-module.mjs --all

      - name: � Camada 0c — Audit Loop Fechado (canário + run-audit por módulo com baseline)
        # Para cada módulo que tem relatorios/modulos/<mod>/audit-baseline.json,
        # roda o orquestrador oficial (validate → canário → health → certify).
        # Se o canário falhar (detector cego), o job ABORTA.
        # Ver: docs/architecture/06-production-readiness.md §Audit Loop Fechado
        run: |
          set -e
          if [ -d relatorios/modulos ]; then
            for baseline in relatorios/modulos/*/audit-baseline.json; do
              [ -f "$baseline" ] || continue
              mod=$(basename "$(dirname "$baseline")")
              echo "::group::run-audit $mod"
              node scripts/run-audit.mjs --module="$mod"
              echo "::endgroup::"
            done
          else
            echo "::warning::Nenhum audit-baseline encontrado em relatorios/modulos/"
          fi

      - name: 🧪 Camada 0d — Full Audit (manual + regressões + manifesto)
        # Impede verde falso: além do gate mecânico, valida a revisão manual
        # estruturada em relatorios/modulos/<mod>/audit-baseline.json.
        run: npm run audit:full -- --all

      - name: �🔍 Camada 1 — Health check (regex anti-patterns)
        run: npm run health:check

      - name: 🧠 Camada 2 — Semgrep (regras semânticas)
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep/gladpros
          # Falha o job se ENCONTRAR algum match (ERROR/WARNING).
          # Não usa --baseline-ref para garantir 0 regressões.
        env:
          SEMGREP_TIMEOUT: 300

      - name: 🛡️ Camada 2b — ESLint
        run: npm run lint

      - name: 📐 Camada 2c — Type check
        run: npm run type-check

  # Job separado para que falhas de teste não escondam falhas de qualidade
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --legacy-peer-deps
      - run: npm run db:generate
      - run: npm test -- --ci --reporters=default
