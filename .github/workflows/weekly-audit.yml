name: Weekly Full Audit

# Roda Semgrep em modo full-scan (não só staged) + valida known-bugs
# + health check em todos os módulos. Cria issue se houver regressão.
# Schedule: toda segunda 09:00 UTC (04:00 Dallas).

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  full-audit:
    name: Full Audit (Semgrep + Health + Known-Bugs)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check has code
        id: has-code
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate known-bugs.json
        run: |
          if [ -f relatorios/known-bugs.json ]; then
            if [ -f scripts/validate-known-bugs.mjs ]; then
              node scripts/validate-known-bugs.mjs
            else
              echo "::warning::validate-known-bugs.mjs ausente"
            fi
          else
            echo "::error::relatorios/known-bugs.json ausente"
            exit 1
          fi

      - name: Install dependencies
        if: steps.has-code.outputs.present == 'true'
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: npm audit (high/critical)
        if: steps.has-code.outputs.present == 'true'
        run: |
          # Falha apenas em vulnerabilidades high ou critical (low/moderate só reportam).
          set +e
          npm audit --omit=dev --audit-level=high
          STATUS=$?
          set -e
          if [ "$STATUS" != "0" ]; then
            echo "::error::npm audit detectou vulnerabilidades high/critical em dependências de produção"
            exit 1
          fi
          echo "✅ npm audit limpo (high/critical em prod)."

      - name: Semgrep full scan
        if: steps.has-code.outputs.present == 'true'
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep/gladpros
        continue-on-error: false

      - name: Health check (full, non-staged)
        if: steps.has-code.outputs.present == 'true'
        run: |
          if [ -f scripts/check-module-health.mjs ]; then
            node scripts/check-module-health.mjs --full
          fi

      - name: Certify all production-ready modules (run-audit com canário)
        if: steps.has-code.outputs.present == 'true'
        run: |
          set +e
          EXIT_CODE=0
          if [ -d relatorios/modulos ]; then
            for baseline in relatorios/modulos/*/audit-baseline.json; do
              [ -f "$baseline" ] || continue
              mod=$(basename "$(dirname "$baseline")")
              echo "::group::run-audit $mod"
              node scripts/run-audit.mjs --module="$mod"
              STEP_EXIT=$?
              echo "::endgroup::"
              if [ "$STEP_EXIT" != "0" ]; then
                echo "::error::Módulo $mod perdeu certificação (run-audit exit $STEP_EXIT)"
                EXIT_CODE=$STEP_EXIT
              fi
            done
          fi
          # Fallback: módulos legados sem baseline ainda passam por certify-module
          if [ -f scripts/certify-module.mjs ]; then
            for module in usuarios; do
              if [ ! -f "relatorios/modulos/$module/audit-baseline.json" ]; then
                echo "::group::certify-module $module (legacy, sem baseline)"
                node scripts/certify-module.mjs --module="$module" || EXIT_CODE=$?
                echo "::endgroup::"
              fi
            done
          fi
          exit $EXIT_CODE

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `🚨 Auditoria semanal detectou regressão — ${new Date().toISOString().split('T')[0]}`;
            const body = `A auditoria semanal automática (Semgrep + Health Check + Certification) falhou.

            **Ver run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            **Ações necessárias:**
            1. Verificar quais módulos perderam certificação
            2. Adicionar bugs encontrados em \`relatorios/known-bugs.json\`
            3. Corrigir + adicionar teste de regressão com tag \`@bug:ID\`
            4. Adicionar regra Semgrep se aplicável
            5. Re-rodar \`node scripts/certify-module.mjs --module=X\` local

            cc: @Gladiston-Porto`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['audit', 'regression', 'P1']
            });
