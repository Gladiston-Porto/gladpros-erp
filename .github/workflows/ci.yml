# CI Pipeline - Hybrid Approach
# Smoke test is required, quality checks are non-blocking

name: CI

on:
  push:
    branches: [main, 'chore/**', 'fix/**', 'feat/**', 'feature/**', develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # SMOKE TEST - REQUIRED (blocks PR merge)
  # ============================================
  smoke:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build
        env:
          CI: true
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_dummy_jwt_secret_at_least_32_chars_long_value' }}
          CLIENT_DOC_ENCRYPTION_KEY_BASE64: ${{ secrets.CLIENT_DOC_ENCRYPTION_KEY_BASE64 || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          CLIENT_DOC_ENCRYPTION_KEY_FALLBACKS: ${{ secrets.CLIENT_DOC_ENCRYPTION_KEY_FALLBACKS || '' }}
          KMS_MASTER_KEY: ${{ secrets.KMS_MASTER_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}

      - name: Check build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
          echo "✅ Build successful!"

  # ============================================
  # QUALITY CHECKS - NON-BLOCKING (informational)
  # ============================================
  lint:
    name: 📝 Lint
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run quality:lint

  typecheck:
    name: 🔍 TypeScript
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type Check
        run: npm run quality:types

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gladpros_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create .env for tests
        run: |
          cp .env.example .env
          echo "DATABASE_URL=mysql://root:root@localhost:3306/gladpros_test" >> .env

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run database migrations
        run: npx prisma migrate deploy || npx prisma db push --skip-generate
        env:
          DATABASE_URL: 'mysql://root:root@localhost:3306/gladpros_test'

      - name: Run Tests
        run: npm run quality:test
        env:
          CI: true
