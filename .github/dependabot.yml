version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      dev-tools:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
          - "@types/*"
          - "prettier*"
          - "jest*"
          - "ts-jest"
          - "playwright*"
          - "@playwright/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      sentry:
        patterns:
          - "@sentry/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
    ignore:
      # Pin major versions of core framework — upgrade manually with review
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "github-actions"
      - "dependencies"
