version: '3.9'

# ─────────────────────────────────────────────────────────────
# GladPros ERP — Docker Compose de Produção (VPS Hostinger)
# Uso: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

services:
  # ── Banco de Dados MySQL ───────────────────────────────────
  db:
    image: mysql:8.0
    container_name: gladpros-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gladpros
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Aplicação Next.js ──────────────────────────────────────
  app:
    image: gladpros-app:latest
    container_name: gladpros-app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/gladpros?connection_limit=10&pool_timeout=20
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
      - web
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gladpros-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - web
    depends_on:
      - app

  # ── Migrations (job único, roda e sai) ────────────────────
  migrate:
    image: gladpros-app:latest
    container_name: gladpros-migrate
    restart: no
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/gladpros
    command: ["npx", "prisma", "migrate", "deploy"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  web:
    driver: bridge
